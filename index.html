<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>バイクナビ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: sans-serif;
            background: #1a1a2e;
            color: #fff;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #panel {
            background: #16213e;
            padding: 12px;
            flex-shrink: 0;
        }

        .cc-row {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }

        .cc-btn {
            flex: 1;
            padding: 8px 4px;
            border: 2px solid #0f3460;
            background: #0f3460;
            color: #aaa;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            line-height: 1.4;
            text-align: center;
        }

        .cc-btn.active {
            background: #e94560;
            border-color: #e94560;
            color: #fff;
            font-weight: bold;
        }

        .search-row {
            display: flex;
            gap: 8px;
        }

        #destination {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            background: #0f3460;
            color: #fff;
        }

        #destination::placeholder { color: #888; }

        #searchBtn {
            padding: 12px 20px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            min-width: 64px;
        }

        #searchBtn:disabled { background: #555; cursor: not-allowed; }

        #instruction {
            display: none;
            margin-top: 10px;
            padding: 10px 14px;
            background: #0f3460;
            border-radius: 8px;
            font-size: 15px;
            align-items: center;
            gap: 10px;
        }

        #instruction.show { display: flex; }

        #arrow { font-size: 26px; flex-shrink: 0; }
        #instrText { flex: 1; line-height: 1.4; }
        #dist { font-size: 12px; color: #aaa; flex-shrink: 0; }

        .nav-btns {
            display: none;
            gap: 8px;
            margin-top: 8px;
        }

        .nav-btns.show { display: flex; }

        #pauseBtn {
            flex: 1;
            padding: 10px;
            background: #e9a020;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
        }

        #stopBtn {
            flex: 1;
            padding: 10px;
            background: #444;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        #map { flex: 1; }

        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            display: none;
            z-index: 9999;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div id="panel">
    <div class="cc-row">
        <button class="cc-btn" data-cc="50" onclick="selectCC(this)">〜50cc<br>原付一種</button>
        <button class="cc-btn" data-cc="125" onclick="selectCC(this)">51〜125cc<br>原付二種</button>
        <button class="cc-btn active" data-cc="999" onclick="selectCC(this)">126cc〜<br>軽二輪以上</button>
    </div>
    <div class="search-row">
        <input type="text" id="destination" placeholder="目的地を入力（例：渋谷駅）" onkeydown="if(event.key==='Enter') startNavigation()">
        <button id="searchBtn" onclick="startNavigation()">GO</button>
    </div>
    <div id="instruction">
        <span id="arrow">↑</span>
        <span id="instrText">案内を開始します</span>
        <span id="dist"></span>
    </div>
    <div class="nav-btns" id="navBtns">
        <button id="pauseBtn" onclick="togglePause()">⏸ 一時停止</button>
        <button id="stopBtn" onclick="stopNavigation()">■ 停止</button>
    </div>
</div>

<div id="map"></div>
<div id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

// ===== APIキー =====
const API_KEY = '85f7b37d-5162-4a2f-891a-04f56bc8909e';
// ==================

let map, userMarker, destMarker, routeLine;
let currentCC = 999;
let watchId = null;
let steps = [], routePoints = [];
let currentStepIndex = 0;
let userLat = null, userLng = null;
let navigating = false, paused = false;
let stopSigns = [];

// 地図初期化
map = L.map('map', { zoomControl: true }).setView([35.6812, 139.7671], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors', maxZoom: 19
}).addTo(map);

// 現在地取得
if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
        pos => {
            userLat = pos.coords.latitude;
            userLng = pos.coords.longitude;
            map.setView([userLat, userLng], 15);
            userMarker = L.circleMarker([userLat, userLng], {
                radius: 10, color: '#fff', weight: 3,
                fillColor: '#e94560', fillOpacity: 1
            }).addTo(map);
        },
        () => showToast('現在地の取得に失敗しました。位置情報を許可してください。')
    );
}

function selectCC(btn) {
    document.querySelectorAll('.cc-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCC = parseInt(btn.dataset.cc);
}

function getRouteParams() {
    return currentCC <= 125
        ? { vehicle: 'car', avoid: 'motorway,trunk' }
        : { vehicle: 'car', avoid: '' };
}

async function startNavigation() {
    const dest = document.getElementById('destination').value.trim();
    if (!dest) { showToast('目的地を入力してください'); return; }
    if (!userLat) { showToast('現在地を取得中です。少し待ってから再試行してください'); return; }

    const btn = document.getElementById('searchBtn');
    btn.disabled = true;
    btn.textContent = '…';

    try {
        const destCoords = await geocode(dest);
        const { vehicle, avoid } = getRouteParams();

        let url = `https://graphhopper.com/api/1/route`
            + `?point=${userLat},${userLng}`
            + `&point=${destCoords.lat},${destCoords.lng}`
            + `&vehicle=${vehicle}`
            + `&locale=ja`
            + `&instructions=true`
            + `&calc_points=true`
            + `&points_encoded=true`
            + `&key=${API_KEY}`;
        if (avoid) url += `&avoid=${avoid}`;

        const res = await fetch(url);
        const data = await res.json();

        if (!data.paths || data.paths.length === 0) throw new Error('ルートが見つかりませんでした');

        const path = data.paths[0];
        routePoints = decodePolyline(path.points);

        steps = path.instructions.map(step => ({
            text: step.text,
            sign: step.sign,
            lat: routePoints[step.interval[0]][0],
            lng: routePoints[step.interval[0]][1],
            rightTurnWarned: false,
        }));

        currentStepIndex = 0;
        navigating = true;
        paused = false;

        // ルート描画
        if (routeLine) map.removeLayer(routeLine);
        routeLine = L.polyline(routePoints, { color: '#e94560', weight: 6, opacity: 0.85 }).addTo(map);

        // 目的地マーカー
        if (destMarker) map.removeLayer(destMarker);
        destMarker = L.marker([destCoords.lat, destCoords.lng]).addTo(map).bindPopup(dest).openPopup();

        map.fitBounds(routeLine.getBounds(), { padding: [60, 60] });

        document.getElementById('instruction').classList.add('show');
        document.getElementById('navBtns').classList.add('show');
        showStep(0);
        speak(steps[0].text);

        // 止まれ標識取得
        const lats = routePoints.map(p => p[0]);
        const lngs = routePoints.map(p => p[1]);
        fetchStopSigns(Math.min(...lats), Math.min(...lngs), Math.max(...lats), Math.max(...lngs));

        if (watchId) navigator.geolocation.clearWatch(watchId);
        watchId = navigator.geolocation.watchPosition(updatePosition, null, {
            enableHighAccuracy: true, maximumAge: 2000, timeout: 10000
        });

        const distKm = (path.distance / 1000).toFixed(1);
        const timeMin = Math.round(path.time / 60000);
        showToast(`${distKm}km / 約${timeMin}分`);

    } catch (e) {
        showToast(e.message || 'エラーが発生しました');
    } finally {
        btn.disabled = false;
        btn.textContent = 'GO';
    }
}

function updatePosition(pos) {
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;

    if (userMarker) userMarker.setLatLng([userLat, userLng]);

    if (!navigating || paused || steps.length === 0) return;

    map.panTo([userLat, userLng]);

    if (currentStepIndex < steps.length - 1) {
        const next = steps[currentStepIndex + 1];
        const dist = getDistance(userLat, userLng, next.lat, next.lng);
        document.getElementById('dist').textContent = dist < 1000
            ? `${Math.round(dist)}m` : `${(dist / 1000).toFixed(1)}km`;

        if (currentCC === 50 && !next.rightTurnWarned && (next.sign === 2 || next.sign === 3) && dist < 100) {
            next.rightTurnWarned = true;
            speak('この先、二段階右折の可能性があります');
        }

        if (dist < 40) {
            currentStepIndex++;
            showStep(currentStepIndex);
            speak(steps[currentStepIndex].text);
        }
    }

    // 止まれ標識チェック
    stopSigns.forEach(s => {
        const d = getDistance(userLat, userLng, s.lat, s.lng);
        if (d < 30 && !s.announced) {
            s.announced = true;
            speak('この先、一時停止があります');
        }
        if (d > 80 && s.announced) s.announced = false;
    });

    // 到着判定
    if (currentStepIndex === steps.length - 1) {
        const last = steps[steps.length - 1];
        if (getDistance(userLat, userLng, last.lat, last.lng) < 30) {
            speak('目的地に到着しました');
            showToast('目的地に到着しました');
            stopNavigation();
        }
    }
}

function showStep(index) {
    if (index >= steps.length) return;
    const step = steps[index];
    document.getElementById('instrText').textContent = step.text;
    document.getElementById('arrow').textContent = signToArrow(step.sign);
    document.getElementById('dist').textContent = '';
}

function signToArrow(sign) {
    const m = { '-7': '↰', '-3': '↰', '-2': '↖', '-1': '↗', '0': '↑', '1': '↗', '2': '↘', '3': '↱', '4': '↑', '5': '🏁', '6': '↑', '7': '↑' };
    return m[String(sign)] || '↑';
}

function togglePause() {
    paused = !paused;
    const btn = document.getElementById('pauseBtn');
    if (paused) {
        btn.textContent = '▶ 再開';
        btn.style.background = '#20a020';
        document.getElementById('instrText').textContent = '一時停止中';
        document.getElementById('arrow').textContent = '⏸';
        window.speechSynthesis.cancel();
    } else {
        btn.textContent = '⏸ 一時停止';
        btn.style.background = '#e9a020';
        showStep(currentStepIndex);
        speak(steps[currentStepIndex].text);
    }
}

function stopNavigation() {
    navigating = false;
    paused = false;
    if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
    if (destMarker) { map.removeLayer(destMarker); destMarker = null; }
    steps = [];
    stopSigns = [];
    currentStepIndex = 0;
    document.getElementById('instruction').classList.remove('show');
    document.getElementById('navBtns').classList.remove('show');
    document.getElementById('pauseBtn').textContent = '⏸ 一時停止';
    document.getElementById('pauseBtn').style.background = '#e9a020';
    document.getElementById('destination').value = '';
}

async function geocode(address) {
    const [ghResult, gsiResult] = await Promise.allSettled([
        fetch(`https://graphhopper.com/api/1/geocode?q=${encodeURIComponent(address)}&locale=ja&limit=1&key=${API_KEY}`)
            .then(r => r.json())
            .then(d => d.hits?.length > 0 ? d.hits[0].point : null),
        fetch(`https://msearch.gsi.go.jp/address-search/AddressSearch?q=${encodeURIComponent(address)}`)
            .then(r => r.json())
            .then(d => d?.length > 0 ? { lat: d[0].geometry.coordinates[1], lng: d[0].geometry.coordinates[0] } : null),
    ]);

    const candidates = [ghResult, gsiResult]
        .filter(r => r.status === 'fulfilled' && r.value)
        .map(r => r.value);

    if (candidates.length === 0) throw new Error(`「${address}」が見つかりませんでした`);
    if (candidates.length === 1 || !userLat) return candidates[0];

    return candidates.reduce((best, c) =>
        getDistance(userLat, userLng, c.lat, c.lng) < getDistance(userLat, userLng, best.lat, best.lng) ? c : best
    );
}

async function fetchStopSigns(south, west, north, east) {
    const query = `[out:json][timeout:25];node["highway"~"stop|give_way"](${south},${west},${north},${east});out body;`;
    const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;
    try {
        const res = await fetch(url);
        const data = await res.json();
        stopSigns = data.elements.map(e => ({ lat: e.lat, lng: e.lon, announced: false }));
    } catch(e) {}
}

function speak(text) {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    u.rate = 0.95;
    window.speechSynthesis.speak(u);
}

function getDistance(lat1, lng1, lat2, lng2) {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat / 2) ** 2
        + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180)
        * Math.sin(dLng / 2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function decodePolyline(encoded) {
    const pts = [];
    let i = 0, lat = 0, lng = 0;
    while (i < encoded.length) {
        let b, shift = 0, result = 0;
        do { b = encoded.charCodeAt(i++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
        lat += (result & 1) ? ~(result >> 1) : result >> 1;
        shift = result = 0;
        do { b = encoded.charCodeAt(i++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
        lng += (result & 1) ? ~(result >> 1) : result >> 1;
        pts.push([lat / 1e5, lng / 1e5]);
    }
    return pts;
}

function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.display = 'block';
    clearTimeout(el._timer);
    el._timer = setTimeout(() => { el.style.display = 'none'; }, 3000);
}

</script>
</body>
</html>
